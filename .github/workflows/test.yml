name: Test and Validate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8 (optional)
        run: |
          pip install flake8
          # Stop the build if there are Python syntax errors or undefined names
          flake8 app.py --count --select=E9,F63,F7,F82 --show-source --statistics || true

      - name: Check if app.py is valid Python
        run: |
          python -m py_compile app.py

      - name: Verify dependencies
        run: |
          python -c "import streamlit; import pandas; import plotly; print('All dependencies available')"

      - name: Check requirements.txt syntax
        run: |
          pip install pipdeptree
          pipdeptree -p streamlit > /dev/null

  validate-streamlit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Streamlit
        run: |
          python -m pip install --upgrade pip
          pip install streamlit>=1.44.0 pandas plotly

      - name: Validate Streamlit app
        run: |
          streamlit run app.py --logger.level=error --client.showErrorDetails=true &
          sleep 10
          kill %1 || true
        timeout-minutes: 2
        continue-on-error: true
